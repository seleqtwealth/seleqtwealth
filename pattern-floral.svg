<?xml version="1.0" encoding="UTF-8"?>
<!--
  SELEQT — Floral damask tile.

  Tileable wallpaper-style ornament used behind the SELEQT glyph in the
  page-transition curtain. European royal / baroque feel — six-petal
  rose at the centre, curved leaves around it, and scrolling tendrils
  reaching out to the tile corners. Adjacent tiles' tendrils terminate
  at the same point on the shared corner, so the scrollwork forms
  continuous diagonal vines across whatever surface this tiles on.

  All hollow gold outlines (no fills) at low alpha so the navy ground
  reads through. The CSS (style.css) inlines the same artwork as a
  data URL on the curtain — this file is kept as a standalone asset
  that can be reused for letterhead, social profile artwork, or print.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <g fill="none"
     stroke="rgba(200, 169, 110, 0.4)"
     stroke-width="0.7"
     stroke-linecap="round"
     stroke-linejoin="round">

    <!-- Central six-petal rose: six narrow ellipses around (50,50) -->
    <g transform="translate(50 50)">
      <ellipse cx="0" cy="-7" rx="3.5" ry="6"/>
      <ellipse cx="0" cy="-7" rx="3.5" ry="6" transform="rotate(60)"/>
      <ellipse cx="0" cy="-7" rx="3.5" ry="6" transform="rotate(120)"/>
      <ellipse cx="0" cy="-7" rx="3.5" ry="6" transform="rotate(180)"/>
      <ellipse cx="0" cy="-7" rx="3.5" ry="6" transform="rotate(240)"/>
      <ellipse cx="0" cy="-7" rx="3.5" ry="6" transform="rotate(300)"/>
      <circle r="2"/>
    </g>

    <!-- Four curved leaves immediately above and below the rose -->
    <path d="M 50,30 C 42,25 35,22 28,26"/>
    <path d="M 50,30 C 58,25 65,22 72,26"/>
    <path d="M 50,70 C 42,75 35,78 28,74"/>
    <path d="M 50,70 C 58,75 65,78 72,74"/>

    <!-- Diagonal scrolling tendrils to each tile corner. Endpoints exactly at
         (0,0), (100,0), (0,100), (100,100) so adjacent tiles' tendrils meet
         at shared corners and the scrollwork is unbroken. -->
    <path d="M 28,26 Q 18,18 6,10 Q 3,7 0,0"/>
    <path d="M 72,26 Q 82,18 94,10 Q 97,7 100,0"/>
    <path d="M 28,74 Q 18,82 6,90 Q 3,93 0,100"/>
    <path d="M 72,74 Q 82,82 94,90 Q 97,93 100,100"/>

    <!-- Small bud accents along each tendril -->
    <ellipse cx="18" cy="18" rx="2" ry="1.2" transform="rotate(45 18 18)"/>
    <ellipse cx="82" cy="18" rx="2" ry="1.2" transform="rotate(-45 82 18)"/>
    <ellipse cx="18" cy="82" rx="2" ry="1.2" transform="rotate(-45 18 82)"/>
    <ellipse cx="82" cy="82" rx="2" ry="1.2" transform="rotate(45 82 82)"/>

  </g>
</svg>
