<?xml version="1.0" encoding="UTF-8"?>
<!--
  SELEQT — Floral mandala (ashtadala kamal / eight-petal lotus).

  A single centred ornament used behind the SELEQT glyph in the page-
  transition curtain. Inspired by Hindu/Buddhist lotus iconography and
  classic Indian palace ornament. Hollow outline form so the navy base
  reads through; soft brand gold so it reads as decorative texture.

  The CSS (style.css) inlines the same artwork as a data URL for the
  curtain — this file is kept as a standalone asset that can be reused
  for letterhead, social profile artwork, or print collateral.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <g fill="none" stroke="rgba(200, 169, 110, 0.42)" stroke-width="1" stroke-linejoin="round">
    <!-- Outer thin circle — the lotus boundary -->
    <circle cx="200" cy="200" r="186"/>
    <!-- Inner circle — the bindu, where the SELEQT glyph sits -->
    <circle cx="200" cy="200" r="70"/>
    <!-- Eight petals (ashta dala = eight petals), each rotated 45deg around centre -->
    <path d="M 200,200 C 180,160 180,100 200,80 C 220,100 220,160 200,200 Z"/>
    <path d="M 200,200 C 180,160 180,100 200,80 C 220,100 220,160 200,200 Z" transform="rotate(45 200 200)"/>
    <path d="M 200,200 C 180,160 180,100 200,80 C 220,100 220,160 200,200 Z" transform="rotate(90 200 200)"/>
    <path d="M 200,200 C 180,160 180,100 200,80 C 220,100 220,160 200,200 Z" transform="rotate(135 200 200)"/>
    <path d="M 200,200 C 180,160 180,100 200,80 C 220,100 220,160 200,200 Z" transform="rotate(180 200 200)"/>
    <path d="M 200,200 C 180,160 180,100 200,80 C 220,100 220,160 200,200 Z" transform="rotate(225 200 200)"/>
    <path d="M 200,200 C 180,160 180,100 200,80 C 220,100 220,160 200,200 Z" transform="rotate(270 200 200)"/>
    <path d="M 200,200 C 180,160 180,100 200,80 C 220,100 220,160 200,200 Z" transform="rotate(315 200 200)"/>
  </g>
  <!-- Eight accent dots between petals (anti-cardinal angles, 22.5deg offsets) -->
  <g fill="rgba(200, 169, 110, 0.55)">
    <circle cx="200" cy="130" r="1.8" transform="rotate(22.5 200 200)"/>
    <circle cx="200" cy="130" r="1.8" transform="rotate(67.5 200 200)"/>
    <circle cx="200" cy="130" r="1.8" transform="rotate(112.5 200 200)"/>
    <circle cx="200" cy="130" r="1.8" transform="rotate(157.5 200 200)"/>
    <circle cx="200" cy="130" r="1.8" transform="rotate(202.5 200 200)"/>
    <circle cx="200" cy="130" r="1.8" transform="rotate(247.5 200 200)"/>
    <circle cx="200" cy="130" r="1.8" transform="rotate(292.5 200 200)"/>
    <circle cx="200" cy="130" r="1.8" transform="rotate(337.5 200 200)"/>
  </g>
</svg>
