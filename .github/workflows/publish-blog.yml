name: Publish scheduled blog

# Reveals any due blog post on the listing + sitemap each Wednesday.
# The blog pages already exist in the repo; this only surfaces them on
# schedule, then fires a Vercel deploy hook so the live site refreshes.

on:
  schedule:
    - cron: "30 3 * * 3"   # Wednesdays 03:30 UTC = 09:00 IST
  workflow_dispatch: {}      # allows a manual run from the Actions tab

permissions:
  contents: write

concurrency:
  group: publish-blog
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Release due post(s)
        run: python3 scripts/publish_next.py

      - name: Commit and push if anything changed
        id: commit
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "SELEQT Scheduler"
            git config user.email "actions@users.noreply.github.com"
            git add blogs.html sitemap.xml scripts/schedule.json
            git commit -m "Publish scheduled blog post(s) [skip ci]"
            git push
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "No posts due; nothing to commit."
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      # The publish commit is marked [skip ci] and the git->Vercel webhook is
      # unreliable, so trigger the deploy explicitly. VERCEL_DEPLOY_HOOK is a
      # repo secret holding the Vercel deploy-hook URL for the production project.
      - name: Trigger Vercel deploy (refresh listing + sitemap)
        if: steps.commit.outputs.published == 'true'
        run: |
          if [ -n "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" > /dev/null && echo "Vercel deploy triggered."
          else
            echo "WARNING: VERCEL_DEPLOY_HOOK secret not set - the new post will not appear on the live listing until a deploy runs."
          fi
